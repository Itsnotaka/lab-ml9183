---
- name: Deploy platform chart with Helm
  hosts: node1
  become: true
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    chart_src_path: "{{ playbook_dir }}/../../k8s/platform"
    remote_chart_path: /tmp/chefmate-k8s/platform
    release_name: chefmate-platform
    namespace_name: chefmate-platform
    minio_access_key: minioadmin
    mlflow_bucket: mlflow
    postgres_username: mlflow
    postgres_db: mlflow
  tasks:
    - name: Detect sharednet IP from ansible facts
      ansible.builtin.set_fact:
        external_ip: >-
          {{
            (
              ansible_facts['all_ipv4_addresses']
              | select('match', '^10\\.56\\.')
              | list
              | first
            )
            | default(ansible_facts['default_ipv4']['address'], true)
          }}

    - name: Ensure remote chart directory exists
      ansible.builtin.file:
        path: "{{ remote_chart_path }}"
        state: directory
        mode: "0755"

    - name: Copy platform chart to node1
      ansible.builtin.copy:
        src: "{{ chart_src_path }}/"
        dest: "{{ remote_chart_path }}/"
        mode: preserve

    - name: Ensure platform namespace exists
      ansible.builtin.command: kubectl create namespace {{ namespace_name }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ns_create
      failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
      changed_when: ns_create.rc == 0

    - name: Mark platform namespace as Helm-managed
      ansible.builtin.shell: |
        kubectl label namespace {{ namespace_name }} app.kubernetes.io/managed-by=Helm --overwrite
        kubectl annotate namespace {{ namespace_name }} meta.helm.sh/release-name={{ release_name }} --overwrite
        kubectl annotate namespace {{ namespace_name }} meta.helm.sh/release-namespace={{ namespace_name }} --overwrite
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Check for existing MinIO secret
      ansible.builtin.command: kubectl get secret minio-credentials -n {{ namespace_name }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: minio_secret_check
      failed_when: false
      changed_when: false

    - name: Generate MinIO secret key
      ansible.builtin.set_fact:
        minio_secret_key: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"
      when: minio_secret_check.rc != 0

    - name: Create MinIO credentials secret
      ansible.builtin.command: >-
        kubectl create secret generic minio-credentials
        --namespace {{ namespace_name }}
        --from-literal=accesskey={{ minio_access_key }}
        --from-literal=secretkey={{ minio_secret_key }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: minio_secret_check.rc != 0

    - name: Check for existing Postgres secret
      ansible.builtin.command: kubectl get secret postgres-credentials -n {{ namespace_name }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: postgres_secret_check
      failed_when: false
      changed_when: false

    - name: Generate Postgres password
      ansible.builtin.set_fact:
        postgres_password: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"
      when: postgres_secret_check.rc != 0

    - name: Create Postgres credentials secret
      ansible.builtin.command: >-
        kubectl create secret generic postgres-credentials
        --namespace {{ namespace_name }}
        --from-literal=username={{ postgres_username }}
        --from-literal=password={{ postgres_password }}
        --from-literal=dbname={{ postgres_db }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: postgres_secret_check.rc != 0

    - name: Install or upgrade platform chart
      ansible.builtin.command: >-
        helm upgrade --install {{ release_name }} {{ remote_chart_path }}
        --namespace {{ namespace_name }}
        --set-string minio.externalIP={{ external_ip }}
        --set-string mlflow.externalIP={{ external_ip }}
        --set-string minio.bucketName={{ mlflow_bucket }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: helm_platform
      changed_when: true

    - name: Show Helm output
      ansible.builtin.debug:
        msg: "{{ helm_platform.stdout_lines }}"
