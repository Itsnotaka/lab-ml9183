---
- name: Deploy staging Mealie chart with Helm
  hosts: node1
  become: true
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    chart_src_path: "{{ playbook_dir }}/../../k8s/staging"
    remote_chart_path: /tmp/chefmate-k8s/staging
    release_name: chefmate-staging
    namespace_name: chefmate-staging
    mealie_base_url_port: 8082
    mealie_db_name: mealie
    mealie_db_user: mealie
  tasks:
    - name: Detect sharednet IP from ansible facts
      ansible.builtin.set_fact:
        external_ip: >-
          {{
            (
              ansible_facts['all_ipv4_addresses']
              | select('match', '^10\\.56\\.')
              | list
              | first
            )
            | default(ansible_facts['default_ipv4']['address'], true)
          }}

    - name: Ensure remote chart directory exists
      ansible.builtin.file:
        path: "{{ remote_chart_path }}"
        state: directory
        mode: "0755"

    - name: Copy staging chart to node1
      ansible.builtin.copy:
        src: "{{ chart_src_path }}/"
        dest: "{{ remote_chart_path }}/"
        mode: preserve

    - name: Ensure staging namespace exists
      ansible.builtin.command: kubectl create namespace {{ namespace_name }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ns_create
      failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
      changed_when: ns_create.rc == 0

    - name: Mark staging namespace as Helm-managed
      ansible.builtin.shell: |
        kubectl label namespace {{ namespace_name }} app.kubernetes.io/managed-by=Helm --overwrite
        kubectl annotate namespace {{ namespace_name }} meta.helm.sh/release-name={{ release_name }} --overwrite
        kubectl annotate namespace {{ namespace_name }} meta.helm.sh/release-namespace={{ namespace_name }} --overwrite
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Check for existing Mealie secret
      ansible.builtin.command: kubectl get secret mealie-credentials -n {{ namespace_name }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: mealie_secret_check
      failed_when: false
      changed_when: false

    - name: Generate Mealie DB password
      ansible.builtin.set_fact:
        mealie_db_password: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"
      when: mealie_secret_check.rc != 0

    - name: Create Mealie credentials secret
      ansible.builtin.command: >-
        kubectl create secret generic mealie-credentials
        --namespace {{ namespace_name }}
        --from-literal=postgres-user={{ mealie_db_user }}
        --from-literal=postgres-password={{ mealie_db_password }}
        --from-literal=postgres-db={{ mealie_db_name }}
        --from-literal=base-url=http://{{ external_ip }}:{{ mealie_base_url_port }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: mealie_secret_check.rc != 0

    - name: Install or upgrade staging chart
      ansible.builtin.command: >-
        helm upgrade --install {{ release_name }} {{ remote_chart_path }}
        --namespace {{ namespace_name }}
        --set-string service.externalIP={{ external_ip }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: helm_staging
      changed_when: true

    - name: Show Helm output
      ansible.builtin.debug:
        msg: "{{ helm_staging.stdout_lines }}"
