---
- name: Install k3s server on node1
  hosts: node1
  become: true
  tasks:
    - name: Check whether k3s server is already installed
      ansible.builtin.stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: k3s_server

    - name: Install k3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --node-name node1 --disable traefik" sh -
      args:
        executable: /bin/bash
      when: not k3s_server.stat.exists

    - name: Wait for node token file
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 120

    - name: Read cluster token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Save cluster token fact
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Install k3s agents on workers
  hosts: node2,node3
  become: true
  vars:
    k3s_server_url: "https://{{ hostvars['node1'].ansible_host }}:6443"
    k3s_cluster_token: "{{ hostvars['node1'].k3s_cluster_token }}"
  tasks:
    - name: Check whether k3s agent is already installed
      ansible.builtin.stat:
        path: /etc/systemd/system/k3s-agent.service
      register: k3s_agent

    - name: Install k3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | K3S_URL="{{ k3s_server_url }}" K3S_TOKEN="{{ k3s_cluster_token }}" INSTALL_K3S_EXEC="agent --node-name {{ inventory_hostname }}" sh -
      args:
        executable: /bin/bash
      when: not k3s_agent.stat.exists

- name: Verify cluster readiness from node1
  hosts: node1
  become: true
  tasks:
    - name: Wait for Kubernetes nodes to register
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: kubectl_nodes
      retries: 12
      delay: 10
      until: kubectl_nodes.rc == 0
      changed_when: false

    - name: Show node output
      ansible.builtin.debug:
        msg: "{{ kubectl_nodes.stdout_lines }}"
