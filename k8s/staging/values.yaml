namespace: chefmate-staging
replicaCount: 1

image:
  repository: ghcr.io/mealie-recipes/mealie
  tag: v3.10.1

service:
  port: 8082
  externalIP: "0.0.0.0"

postgres:
  persistenceSize: 8Gi

app:
  persistenceSize: 8Gi
  nodeSelector:
    kubernetes.io/hostname: node1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

database:
  nodeSelector:
    kubernetes.io/hostname: node1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
