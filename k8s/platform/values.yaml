namespace: chefmate-platform

minio:
  externalIP: "0.0.0.0"
  bucketName: mlflow
  persistenceSize: 20Gi
  nodeSelector:
    kubernetes.io/hostname: node1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

postgres:
  persistenceSize: 10Gi
  nodeSelector:
    kubernetes.io/hostname: node1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

mlflow:
  externalIP: "0.0.0.0"
  nodeSelector:
    kubernetes.io/hostname: node1
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
